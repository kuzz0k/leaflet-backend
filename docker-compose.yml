version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./maps:/app/maps
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - leaflet-net

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: leaflet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - leaflet-net

networks:
  leaflet-net:
    driver: bridge

volumes:
  postgres_data:
